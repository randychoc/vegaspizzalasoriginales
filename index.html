<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vegas Pizza - Catálogo</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Header -->
    <header class="text-white py-3">
        <div class="container">
            <div class="row align-items-center text-center text-md-start">
                <!-- Logo izquierda -->
                <div class="col-12 col-md-4 mb-2 mb-md-0 d-flex justify-content-center justify-content-md-start">
                    <img src="img/vegasPizzaLogo.png" alt="Vegas Pizza Logo" class="me-2"
                        style="height: 80px; border-radius: 25px; " />
                    <h1 class="fw-bold h2 mt-2">Vegas Pizza Las Originales</h1>
                </div>
                <!-- Teléfono centro -->
                <div class="col-12 col-md-4 mb-2 mb-md-0 d-flex justify-content-center">
                    <span class="fw-bold h4">📞 4770-7384</span>
                </div>
                <!-- Dirección derecha -->
                <div class="col-12 col-md-4 d-flex justify-content-center justify-content-md-end">
                    <span class="fw-bold h4">📍 5a Avenida 3-45 Zona 1, Ciudad</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Carrusel de Categorías -->
    <div class="carruselContainer">
        <div class="categoria-carousel-wrapper">
            <button id="btn-prev"
                class="btn btn-dark position-absolute start-0 top-50 translate-middle-y z-1">◀</button>

            <div class="text-center overflow-auto" id="filtros-categorias"
                style="white-space: nowrap; scroll-behavior: smooth;">
                <!-- Categorías generadas por JS -->
            </div>

            <button id="btn-next" class="btn btn-dark position-absolute end-0 top-50 translate-middle-y z-1">▶</button>

            <!-- <div class="text-center text-white mt-1 mb-1">
                <span class="fw-bold">⬅️ Desliza para ver más ➡️ </span>
            </div> -->
        </div>
    </div>

    <!-- Catálogo generado dinámicamente -->
    <main class="container my-4" id="catalogo"></main>

    <!-- WhatsApp flotante -->
    <a href="https://wa.me/50247707384?text=Buen+d%C3%ADa+Vegas+Pizza%2C+quiero+hacer+un+pedido.&type=phone_number&app_absent=0"
        class="whatsapp-float" target="_blank">
        <img src="img/wa_compressed_.jpg" alt="WhatsApp" />
    </a>

    <!-- Footer -->
    <footer class="text-center bg-dark text-light py-4 mt-5">
        <div class="container">
            <p class="mb-1">Lunes a Domingo, 10:00 AM - 8:00 PM</p>
            <p class="mb-1">13 calle B 6-81 Zona 3, Ciudad de Guatemala</p>
            <p class="mb-0">© 2025 Vegas Pizza</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
