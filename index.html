<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" href="img/vegasPizzaLogo.png" type="image/x-icon" />
    <title>Vegas Pizza - Catálogo</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Estilos personalizados -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Header -->
    <header class="text-white">
        <div class="container">
            <div class="row align-items-center text-center text-md-start">
                <!-- Logo izquierda -->
                <div class="col-12 col-md-6 d-flex">
                    <div class="row">
                        <div class="col">
                            <img src="img/vegasPizzaLogo.png" alt="Vegas Pizza Logo" class="me-2"
                                style="height: 80px; border-radius: 25px; " />
                        </div>
                    </div>
                    <div class="col">
                        <h1 class="fw-bold mt-2">Vegas Pizza Las Originales</h1>
                    </div>
                </div>
                <div class="col-12 col-md-6 d-flex">
                    <div class="row mt-3">
                        <div class="col-12">
                            <span class="fw-bold h5">📞 4770-7384</span>
                        </div>
                        <!-- Dirección derecha -->
                        <div class="col-12">
                            <span class="fw-bold h5">📍 5a Avenida 3-45 Zona 1, Ciudad de Guatemala</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Carrusel de Categorías -->
    <div class="carruselContainer">
        <div class="categoria-carousel-wrapper">
            <div class="text-center overflow-auto" id="filtros-categorias"
                style="white-space: nowrap; scroll-behavior: smooth;">
                <!-- Categorías generadas por JS -->
            </div>
        </div>
    </div>

    <!-- Catálogo generado dinámicamente -->
    <main class="container my-4" id="catalogo"></main>

    <!-- WhatsApp flotante -->
    <a href="https://wa.me/50247707384?text=Buen+d%C3%ADa+Vegas+Pizza%2C+quiero+hacer+un+pedido.&type=phone_number&app_absent=0"
        class="whatsapp-float" target="_blank">
        <img src="img/wa_compressed_.jpg" alt="WhatsApp" />
    </a>

    <!-- Footer -->
    <footer class="text-center bg-dark text-light py-4 mt-5">
        <div class="container">
            <p class="mb-1">Lunes a Domingo, 10:00 AM - 8:00 PM</p>
            <p class="mb-0">© 2025 Vegas Pizza</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
